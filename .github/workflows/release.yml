name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g. 1.2.0)'
        required: true
        default: '1.2.0'

permissions:
  contents: write

env:
  APP_VERSION: ''

jobs:
  # ==================== 解析版本号 ====================
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - name: Get version
        id: get
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

  # ==================== Docker 镜像构建 ====================
  docker:
    needs: version
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sparknoteai/backend:${{ env.APP_VERSION }}
            sparknoteai/backend:latest
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            BUILD_NUMBER=${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            sparknoteai/frontend:${{ env.APP_VERSION }}
            sparknoteai/frontend:latest
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            BUILD_NUMBER=${{ github.sha }}

  # ==================== Electron macOS (ARM + Intel) ====================
  electron-mac:
    needs: version
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            label: Apple Silicon
          - runner: macos-14
            arch: x64
            label: Intel

    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: |
          cd apps/frontend
          npm install

      - name: Install root dependencies
        run: npm install

      - name: Apply patches
        run: npx patch-package

      - name: Sync version to package.json
        run: |
          cd apps/frontend
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build frontend (Web)
        run: npm run build:frontend

      - name: Fix electron paths
        run: |
          cd apps/frontend
          node fix-electron-paths.js

      - name: Build Electron (macOS ${{ matrix.label }})
        run: |
          ulimit -n 65536
          cd apps/frontend
          npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: ls -la release/

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            release/SparkNoteAI-*-${{ matrix.arch }}-Mac.dmg
            release/SparkNoteAI-*-${{ matrix.arch }}-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Electron Windows ====================
  electron-win:
    needs: version
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          Set-Location apps/frontend
          npm install

      - name: Install root dependencies
        run: npm install

      - name: Apply patches
        run: npx patch-package

      - name: Sync version to package.json
        run: |
          cd apps/frontend
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build frontend (Web)
        run: npm run build:frontend

      - name: Fix electron paths
        shell: pwsh
        run: |
          Set-Location apps/frontend
          node fix-electron-paths.js

      - name: Build Electron (Windows x64)
        run: |
          cd apps/frontend
          npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Windows arm64)
        run: |
          cd apps/frontend
          npx electron-builder --win --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem release/

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            release/SparkNoteAI-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Android APK ====================
  android:
    needs: version
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate Android native project
        run: |
          cd apps/frontend
          npx expo prebuild --clean --platform android

      - name: Build APK
        run: |
          cd apps/frontend/android
          ./gradlew assembleRelease

      - name: Find APK
        id: apk_path
        run: |
          APK=$(find apps/frontend/android/app/build/outputs/apk/release -name "*.apk" -not -name "*unaligned*" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          ls -la "$APK"

      - name: Upload Android APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: ${{ steps.apk_path.outputs.apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
