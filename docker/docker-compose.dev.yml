# 开发环境 Docker Compose 配置
# 仅包含基础设施（DB + Redis + Neo4j），后端本地运行

services:
  # ==================== PostgreSQL 数据库 ====================
  db:
    image: postgres:15-alpine
    container_name: sparknoteai-db
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sparknoteai}
      POSTGRES_USER: ${POSTGRES_USER:-sparknoteai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparknoteai123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sparknoteai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparknoteai -d sparknoteai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: sparknoteai-redis
    ports:
      - "6379:6379"
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-sparknoteai123}
    volumes:
      - redis_data:/data
    networks:
      - sparknoteai-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-sparknoteai123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Neo4j 知识图谱 ====================
  neo4j:
    image: neo4j:5-community
    container_name: sparknoteai-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - .env
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-sparknoteai123}
    volumes:
      - neo4j_data:/data
    networks:
      - sparknoteai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==================== 数据卷 ====================
volumes:
  postgres_data:
  redis_data:
  neo4j_data:

# ==================== 网络 ====================
networks:
  sparknoteai-network:
    driver: bridge
